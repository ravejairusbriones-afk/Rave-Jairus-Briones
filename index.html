<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRIONES — Elegant Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===== RESET & 100dvh ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100dvw;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== BACKGROUND ===== */
        .hero {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.96) 15%, rgba(0, 0, 0, 0.6) 40%, rgba(0, 0, 0, 0) 70%),
                url('your-photo.jpg');
            background-size: cover;
            background-position: center 10%;
            background-repeat: no-repeat;
            background-color: #000;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #000 20%, rgba(0, 0, 0, 0) 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== FOG CANVAS ===== */
        #fog-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.6;
            filter: blur(70px);
            will-change: transform, filter;
            transform: translateZ(0);
        }

        /* ===== HEADER ===== */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            padding: 0 clamp(15px, 4vw, 70px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .logo-b {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 3vw, 3.2rem);
            font-weight: 500;
        }
        .logo-name {
            font-size: clamp(0.5rem, 0.8vw, 0.75rem);
            letter-spacing: 0.45em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .nav-wrapper {
            display: flex;
            align-items: center;
            gap: clamp(15px, 3vw, 50px);
        }
        .nav-links {
            display: flex;
            gap: clamp(20px, 3vw, 45px);
            list-style: none;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: clamp(1rem, 1.5vw, 1.4rem);
            letter-spacing: 0.05em;
            transition: 0.3s ease;
            position: relative;
        }
        .nav-link:hover,
        .nav-link.active {
            color: #fff;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
        }

        .menu-container {
            position: relative;
            width: clamp(52px, 7vw, 64px);
            height: clamp(52px, 7vw, 64px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s ease;
            pointer-events: auto;
        }
        .menu-container:hover {
            border-color: #fff;
            transform: scale(1.03);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .menu span {
            display: block;
            height: 2px;
            background: #fff;
            transition: 0.2s;
        }
        .menu span:nth-child(1) {
            width: 22px;
        }
        .menu span:nth-child(2) {
            width: 16px;
        }
        .menu span:nth-child(3) {
            width: 12px;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: 65px;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px 32px;
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 180px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8);
        }
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .dropdown.active {
            display: block;
            animation: popIn 0.35s ease forwards;
        }
        .dropdown a {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 18px;
            transition: 0.2s;
        }
        .dropdown a:last-child {
            margin-bottom: 0;
        }
        .dropdown a:hover {
            color: #fff;
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .content-container {
            position: absolute;
            top: 0;
            left: clamp(20px, 4vw, 70px);
            height: 100dvh;
            padding-top: 90px;
            padding-bottom: clamp(50px, 8vh, 90px);
            width: clamp(300px, 50vw, 650px);
            max-width: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
        }
        .content-container h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.2rem, 10vw, 8rem);
            line-height: 0.88;
            font-weight: 500;
            letter-spacing: -0.03em;
            text-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }
        .grey-text {
            color: #888888;
        }
        .subtext {
            margin-top: clamp(15px, 3vh, 35px);
            font-size: clamp(0.9rem, 1.5vw, 1.15rem);
            font-weight: 300;
            line-height: 1.6;
            color: #d5d5d5;
            pointer-events: auto;
        }

        /* ===== VIEW WORK BUTTON ===== */
        .btn-view-work {
            display: inline-flex;
            align-items: center;
            margin-top: clamp(20px, 4vh, 45px);
            padding: clamp(10px, 1.2vh, 14px) clamp(20px, 3vw, 32px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
            font-size: clamp(0.65rem, 1vw, 0.8rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: transparent;
            transition: 0.4s ease;
            pointer-events: auto;
            cursor: pointer;
        }
        .btn-view-work:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        .arrow-circle {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: clamp(24px, 3vw, 32px);
            height: clamp(24px, 3vw, 32px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-left: clamp(8px, 1.5vw, 15px);
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            transition: 0.4s ease;
        }
        .btn-view-work:hover .arrow-circle {
            transform: translateX(6px);
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ===== SOCIAL SIDEBAR ===== */
        .social-sidebar {
            position: absolute;
            right: clamp(15px, 3vw, 50px);
            bottom: clamp(15px, 3vh, 50px);
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: clamp(16px, 2.5vh, 24px);
            pointer-events: none;
        }
        .social-btn {
            width: clamp(46px, 6vw, 58px);
            height: clamp(46px, 6vw, 58px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-decoration: none;
            font-size: clamp(1.2rem, 1.5vw, 1.6rem);
            transition: 0.3s ease;
            pointer-events: auto;
        }
        .social-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.08);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
        }

        /* ===== OVERLAY — transparent page with bar panel ===== */
        .work-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.55s ease, visibility 0.55s ease;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            pointer-events: none;
        }
        .work-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* ---- close button (top-right) ---- */
        .overlay-close {
            position: absolute;
            top: 30px;
            right: 35px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.35s ease;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        .overlay-close:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg) scale(1.05);
        }

        /* ---- minimalistic bar panel (left corner) ---- */
        .project-panel {
            position: absolute;
            top: 50%;
            left: clamp(20px, 4vw, 60px);
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px 20px 18px 20px;
            min-width: 200px;
            max-width: 280px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            transition: 0.35s ease;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .project-panel:hover {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.07);
        }

        /* subtle label above list */
        .panel-label {
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            padding: 0 4px 6px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 4px;
            font-weight: 400;
            user-select: none;
        }

        /* project item — bar style */
        .project-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border: 1px solid transparent;
            position: relative;
        }
        .project-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }
        .project-item:active {
            transform: scale(0.97);
        }

        .project-item .icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            transition: 0.3s ease;
        }
        .project-item:hover .icon {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .project-item .info {
            display: flex;
            flex-direction: column;
            gap: 0px;
        }
        .project-item .title {
            font-size: 0.85rem;
            font-weight: 450;
            letter-spacing: 0.01em;
            line-height: 1.3;
        }
        .project-item .sub {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.04em;
            font-weight: 300;
        }

        .project-item .arrow-indicator {
            margin-left: auto;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.15);
            transition: 0.3s ease;
        }
        .project-item:hover .arrow-indicator {
            color: rgba(255, 255, 255, 0.5);
            transform: translateX(4px);
        }

        /* placeholder for future projects (hidden) */
        .project-item.placeholder {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }
        .project-item.placeholder:hover {
            transform: none;
            background: transparent;
            border-color: transparent;
        }

        /* small responsive tweaks */
        @media (max-width: 600px) {
            .project-panel {
                left: 16px;
                right: 16px;
                top: auto;
                bottom: 30px;
                transform: none;
                min-width: 0;
                max-width: none;
                padding: 14px 16px;
            }
            .overlay-close {
                top: 18px;
                right: 18px;
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            .project-item {
                padding: 10px 12px;
            }
            .project-item .title {
                font-size: 0.8rem;
            }
            .project-item .icon {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

                <div class="menu-container" id="menu-container">

                    <div class="dropdown" id="dropdown-menu">

        </div>
    </section>

    <!-- ===== OVERLAY — transparent page with bar panel ===== -->
    <div class="work-overlay" id="workOverlay">
        <!-- close button -->
        <button class="overlay-close" id="overlayClose" aria-label="Close">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <!-- minimalistic bar panel — left corner -->
        <div class="project-panel" id="projectPanel">
            <div class="panel-label">Projects</div>

            <!-- project item: Schedules App Project -->
            <a class="project-item" id="schedulesProject" href="https://ravejairusbriones-afk.github.io/Brionian_Schedules/" target="_blank">
                <span class="icon"><i class="fa-regular fa-calendar"></i></span>
                <span class="info">
                    <span class="title">Schedules App</span>

                </span>
                <span class="arrow-indicator"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>

            <!-- new project: Brionesian Ai -->
            <a class="project-item" href="https://ravejairusbriones-afk.github.io/Brionesian-Ai/" target="_blank">
                <span class="icon"><i class="fa-solid fa-robot"></i></span>
                <span class="info">
                    <span class="title">Brionesian Ai</span>
                    <span class="sub">Project</span>
                </span>
                <span class="arrow-indicator"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
            </a>

            <!-- placeholder for future projects (keeps the panel organized) -->
            <div class="project-item placeholder">
                <span class="icon" style="opacity:0.3;"><i class="fa-regular fa-circle"></i></span>
                <span class="info">
                    <span class="title" style="color:rgba(255,255,255,0.15);">More coming</span>
                    <span class="sub" style="color:rgba(255,255,255,0.08);">soon</span>
                </span>
                <span class="arrow-indicator" style="opacity:0.1;">·</span>
            </div>
        </div>
    </div>

    <script>
        // ===== MENU TOGGLE =====
        const menuContainer = document.getElementById('menu-container');
        const dropdownMenu = document.getElementById('dropdown-menu');

        if (menuContainer && dropdownMenu) {
            menuContainer.addEventListener('click', (event) => {
                event.stopPropagation();
                dropdownMenu.classList.toggle('active');
            });
            window.addEventListener('click', () => {
                dropdownMenu.classList.remove('active');
            });
            dropdownMenu.addEventListener('click', (e) => e.stopPropagation());
        }

        // ===== VIEW WORK OVERLAY =====
        (function() {
            const overlay = document.getElementById('workOverlay');
            const viewBtn = document.getElementById('viewWorkBtn');
            const closeBtn = document.getElementById('overlayClose');
            const panel = document.getElementById('projectPanel');

            if (!overlay || !viewBtn) return;

            // open overlay
            function openOverlay() {
                overlay.classList.add('active');
                // small haptic-like feedback
                viewBtn.style.transform = 'scale(0.96)';
                setTimeout(() => { viewBtn.style.transform = ''; }, 150);
            }

            // close overlay
            function closeOverlay() {
                overlay.classList.remove('active');
            }

            // open on button click
            viewBtn.addEventListener('click', openOverlay);

            // close on X
            if (closeBtn) {
                closeBtn.addEventListener('click', closeOverlay);
            }

            // close on click outside panel (but not on panel itself)
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    closeOverlay();
                }
            });

            // close on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && overlay.classList.contains('active')) {
                    closeOverlay();
                }
            });

            // ensure the project link works as expected (it's an <a> with target="_blank")
            // no extra logic needed — the href already points to the correct URL.
            // we prevent the overlay from closing when clicking the project item,
            // but since it opens in a new tab, the overlay stays visible (nice!)
            // if the user wants to close it, they can use the X or click outside.

            // optional: if the link is clicked, we keep the overlay open
            // so the user can still see the panel after returning from the new tab.
            const projectLink = document.getElementById('schedulesProject');
            if (projectLink) {
                projectLink.addEventListener('click', function(e) {
                    // The link opens in a new tab (target="_blank"), so the overlay stays.
                    // No need to prevent default or close.
                });
            }

            // also allow clicking the panel itself to not close (stopPropagation)
            if (panel) {
                panel.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }
        })();

        // ===== OPTIMIZED FLUID FOG – GPU blur via CSS =====
        (function() {
            const canvas = document.getElementById('fog-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            let animationFrameId;
            let time = 0;

            const PARTICLE_COUNT = 50;
            const MAX_OPACITY = 0.03;

            class FogParticle {
                constructor() {
                    this.reset(true);
                }
                reset(init = false) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.7;
                    this.vy = (Math.random() - 0.5) * 0.35;
                    this.radius = 200 + Math.random() * 350;
                    this.phase = Math.random() * Math.PI * 2;
                    this.pulseSpeed = 0.002 + Math.random() * 0.006;
                    this.life = init ? 1 : Math.random();
                }
                update() {
                    const windScale = 0.0008;
                    const windStrength = 0.03;
                    const angle = Math.sin(this.x * windScale + time * 0.0002) *
                        Math.cos(this.y * windScale * 1.3 + time * 0.0003) *
                        Math.sin(time * 0.0001) * 6.28;

                    this.vx += Math.cos(angle) * windStrength;
                    this.vy += Math.sin(angle) * windStrength;

                    this.vx *= 0.995;
                    this.vy *= 0.995;

                    this.x += this.vx;
                    this.y += this.vy;
                    this.phase += this.pulseSpeed;

                    if (this.x < -this.radius) this.x = width + this.radius;
                    if (this.x > width + this.radius) this.x = -this.radius;
                    if (this.y < -this.radius) this.y = height + this.radius;
                    if (this.y > height + this.radius) this.y = -this.radius;
                }
                draw() {
                    const currentRadius = this.radius * (1 + Math.sin(this.phase) * 0.15);
                    const r = 185,
                        g = 205,
                        b = 235;
                    const alpha = MAX_OPACITY * (0.7 + Math.sin(this.phase * 0.8) * 0.3);

                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, currentRadius);
                    gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
                    gradient.addColorStop(0.4, `rgba(${r-15}, ${g-10}, ${b-10}, ${alpha * 0.6})`);
                    gradient.addColorStop(1, `rgba(${r-30}, ${g-25}, ${b-30}, 0)`);

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new FogParticle());
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function animateFog() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);

                time += 0.5;

                for (let p of particles) {
                    p.update();
                    p.draw();
                }

                animationFrameId = requestAnimationFrame(animateFog);
            }

            resizeCanvas();
            animateFog();

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    resizeCanvas();
                }, 200);
            });

            window.addEventListener('beforeunload', () => {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            });
        })();
    </script>
</body>
</html>
